<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>קישורי בדיקה · שאול תמרוקים</title>
<style>
:root{
  --bg:#FAF7F8; --surface:#fff; --surface-2:#F5EFF4; --ink:#2B2330; --ink-2:#5C5063;
  --muted:#8A7C90; --line:#E7DCE5; --line-2:#D6C7D4; --brand:#6E2F69; --brand-ink:#5A2456;
  --brand-soft:#F3EAF2; --gold:#A97A1F; --gold-soft:#FBF2DF; --ok:#2F6B4F; --ok-soft:#E7F1EB;
  --warn:#9E7A1B; --danger:#9E2B2B; --danger-soft:#FBECEC;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Assistant","Heebo","Segoe UI",system-ui,sans-serif;font-size:16px;line-height:1.5}
.wrap{max-width:640px;margin:0 auto;padding:24px 16px 60px}
h1{font-size:24px;font-weight:800;letter-spacing:-.02em;margin:0 0 4px}
.sub{color:var(--muted);margin:0 0 24px;font-size:15px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px;
  box-shadow:0 8px 28px -18px rgba(43,35,48,.3);margin-bottom:18px}
label{display:block;font-size:14px;font-weight:600;color:var(--ink-2);margin:0 0 6px}
input,select{width:100%;padding:12px 13px;border:1px solid var(--line-2);border-radius:10px;
  font:inherit;background:var(--surface)}
input:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:14px}
.seg{display:flex;gap:8px}
.seg button{flex:1;padding:11px;border:1px solid var(--line-2);background:var(--surface);
  border-radius:10px;font:inherit;cursor:pointer;color:var(--ink-2)}
.seg button.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand);font-weight:700}
.btn{width:100%;border:0;border-radius:12px;padding:15px;font-size:17px;font-weight:700;cursor:pointer;
  background:var(--brand);color:#fff;transition:background .15s}
.btn:hover{background:var(--brand-ink)}
.btn:disabled{opacity:.6;cursor:default}
.result{display:none;margin-top:18px;border-top:1px solid var(--line);padding-top:18px}
.result.show{display:block}
.linkbox{display:flex;gap:8px;margin-top:6px}
.linkbox input{font-size:13px;direction:ltr;text-align:left;background:var(--surface-2)}
.copy{flex:none;padding:12px 16px;border:1px solid var(--brand);background:var(--brand-soft);
  color:var(--brand);border-radius:10px;font:inherit;font-weight:700;cursor:pointer}
.copy.done{background:var(--ok-soft);border-color:var(--ok);color:var(--ok)}
.qr{text-align:center;margin-top:16px}
.qr img{width:200px;height:200px;border:1px solid var(--line);border-radius:12px;padding:6px;background:#fff}
.qr p{color:var(--muted);font-size:13px;margin:8px 0 0}
.meta{font-size:13px;color:var(--muted);margin-top:10px}
h2{font-size:15px;letter-spacing:.05em;color:var(--muted);font-weight:700;margin:26px 0 10px}
.list{display:flex;flex-direction:column;gap:8px}
.item{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;
  display:flex;align-items:center;gap:10px}
.item .nm{font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill{flex:none;font-size:12px;font-weight:700;padding:3px 9px;border-radius:99px}
.pill.waiting{background:var(--brand-soft);color:var(--brand)}
.pill.opened{background:var(--ok-soft);color:var(--ok)}
.pill.expired{background:var(--gold-soft);color:var(--warn)}
.pill.revoked{background:var(--danger-soft);color:var(--danger)}
.mini{flex:none;background:none;border:0;color:var(--muted);cursor:pointer;font:inherit;font-size:13px;
  padding:4px 6px;text-decoration:underline}
.mini.copy2{color:var(--brand)}
.mini.del{color:var(--danger)}
.empty{color:var(--muted);font-size:14px;text-align:center;padding:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:10px 18px;border-radius:99px;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <h1>קישורי בדיקה 🪷</h1>
  <p class="sub">יצירת קישור אישי לטופס 101 — לשליחה בוואטספ או לסריקה בנייד</p>

  <div class="card">
    <div class="row">
      <div class="field"><label>שם פרטי</label><input id="firstName" value="גל"></div>
      <div class="field"><label>שם משפחה</label><input id="lastName" value="פדידה"></div>
    </div>
    <div class="field">
      <label>מגדר</label>
      <div class="seg" id="gender">
        <button data-v="f" class="on">נקבה</button>
        <button data-v="m">זכר</button>
      </div>
    </div>
    <div class="row">
      <div class="field"><label>סניף</label><select id="branch"></select></div>
      <div class="field"><label>נייד</label><input id="mobile" value="0546389555" dir="ltr" style="text-align:left"></div>
    </div>
    <div class="field"><label>תוקף (ימים)</label><input id="days" type="number" value="14"></div>
    <button class="btn" id="go">יצירת קישור</button>

    <div class="result" id="result">
      <label>הקישור מוכן — אפשר לשלוח בוואטספ:</label>
      <div class="linkbox">
        <input id="link" readonly>
        <button class="copy" id="copy">העתקה</button>
      </div>
      <div class="qr"><img id="qr" alt="QR"><p>או לסרוק את הקוד מהנייד</p></div>
      <div class="meta" id="meta"></div>
    </div>
  </div>

  <h2>קישורים אחרונים</h2>
  <div class="list" id="list"><div class="empty">טוען…</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
const BRANCHES = __BRANCHES__;
const $ = (id) => document.getElementById(id);
let gender = "f";

const branchSel = $("branch");
BRANCHES.forEach((b) => { const o = document.createElement("option"); o.textContent = b; branchSel.appendChild(o); });
branchSel.value = BRANCHES[4];

$("gender").addEventListener("click", (e) => {
  const b = e.target.closest("button"); if (!b) return;
  gender = b.dataset.v;
  [...$("gender").children].forEach((x) => x.classList.toggle("on", x === b));
});

function toast(msg) {
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1600);
}
async function copy(text) {
  try { await navigator.clipboard.writeText(text); return true; } catch { return false; }
}

$("go").onclick = async () => {
  const btn = $("go"); btn.disabled = true; btn.textContent = "יוצר…";
  try {
    const body = {
      firstName: $("firstName").value, lastName: $("lastName").value,
      gender, branch: branchSel.value, mobile: $("mobile").value, days: $("days").value,
    };
    const r = await fetch("/api/create", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    $("link").value = d.link;
    $("qr").src = d.qr;
    $("meta").textContent = "תוקף עד " + new Date(d.expiresAt).toLocaleString("he-IL") + " · מזהה עובד " + d.employeeId;
    $("result").classList.add("show");
    await copy(d.link); toast("הקישור נוצר והועתק");
    load();
  } catch (e) {
    toast("שגיאה: " + e.message);
  } finally {
    btn.disabled = false; btn.textContent = "יצירת קישור";
  }
};

$("copy").onclick = async () => {
  const ok = await copy($("link").value);
  const b = $("copy"); b.textContent = ok ? "הועתק ✓" : "בחרי והעתיקי"; b.classList.toggle("done", ok);
  setTimeout(() => { b.textContent = "העתקה"; b.classList.remove("done"); }, 2000);
};

const LABEL = { waiting: "ממתין", opened: "נפתח", expired: "פג תוקף", revoked: "בוטל" };

async function load() {
  const r = await fetch("/api/list"); const { rows } = await r.json();
  const list = $("list");
  if (!rows.length) { list.innerHTML = '<div class="empty">אין קישורים עדיין</div>'; return; }
  list.innerHTML = "";
  rows.forEach((row) => {
    const el = document.createElement("div"); el.className = "item";
    el.innerHTML =
      '<span class="pill ' + row.state + '">' + LABEL[row.state] + '</span>' +
      '<span class="nm">' + (row.name || "(ללא שם)") + '</span>' +
      '<button class="mini copy2">העתקה</button>' +
      (row.state === "revoked" ? "" : '<button class="mini rev">ביטול</button>') +
      '<button class="mini del">מחיקה</button>';
    el.querySelector(".copy2").onclick = async () => { await copy(row.link); toast("הקישור הועתק"); };
    const rev = el.querySelector(".rev");
    if (rev) rev.onclick = async () => { await fetch("/api/revoke", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: row.token }) }); toast("הקישור בוטל"); load(); };
    el.querySelector(".del").onclick = async () => {
      if (!confirm("למחוק את " + (row.name || "העובד") + " והקישור?")) return;
      await fetch("/api/delete", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: row.token }) });
      toast("נמחק"); load();
    };
    list.appendChild(el);
  });
}
load();
</script>
</body>
</html>
