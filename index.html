<title>טופס 101 · שאול תמרוקים</title>

<style>
:root{
  --bg:#FAF7F8;
  --surface:#FFFFFF;
  --surface-2:#F5EFF4;
  --ink:#2B2330;
  --ink-2:#5C5063;
  --muted:#8A7C90;
  --line:#E7DCE5;
  --line-2:#D6C7D4;
  --brand:#6E2F69;
  --brand-ink:#5A2456;
  --brand-soft:#F3EAF2;
  --gold:#A97A1F;
  --gold-soft:#FBF2DF;
  --danger:#9E2B2B;
  --danger-soft:#FBECEC;
  --ok:#2F6B4F;
  --radius:14px;
  --shadow:0 1px 2px rgba(43,35,48,.05), 0 8px 28px -14px rgba(43,35,48,.22);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#191419;
    --surface:#231C24;
    --surface-2:#2C232E;
    --ink:#F3EBF1;
    --ink-2:#C9BCC8;
    --muted:#9A8C9B;
    --line:#3A2F3C;
    --line-2:#4A3C4C;
    --brand:#CE93C6;
    --brand-ink:#E5BCDF;
    --brand-soft:#31243040;
    --gold:#DDB35C;
    --gold-soft:#3A2E1A;
    --danger:#E58C8C;
    --danger-soft:#3A2020;
    --ok:#8CCBAA;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 28px -14px rgba(0,0,0,.6);
  }
}
:root[data-theme="light"]{
  --bg:#FAF7F8; --surface:#FFFFFF; --surface-2:#F5EFF4; --ink:#2B2330; --ink-2:#5C5063;
  --muted:#8A7C90; --line:#E7DCE5; --line-2:#D6C7D4; --brand:#6E2F69; --brand-ink:#5A2456;
  --brand-soft:#F3EAF2; --gold:#A97A1F; --gold-soft:#FBF2DF; --danger:#9E2B2B;
  --danger-soft:#FBECEC; --ok:#2F6B4F;
  --shadow:0 1px 2px rgba(43,35,48,.05), 0 8px 28px -14px rgba(43,35,48,.22);
}
:root[data-theme="dark"]{
  --bg:#191419; --surface:#231C24; --surface-2:#2C232E; --ink:#F3EBF1; --ink-2:#C9BCC8;
  --muted:#9A8C9B; --line:#3A2F3C; --line-2:#4A3C4C; --brand:#CE93C6; --brand-ink:#E5BCDF;
  --brand-soft:#31243040; --gold:#DDB35C; --gold-soft:#3A2E1A; --danger:#E58C8C;
  --danger-soft:#3A2020; --ok:#8CCBAA;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 28px -14px rgba(0,0,0,.6);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  direction:rtl;
  background:var(--bg);
  color:var(--ink);
  font-family:"Assistant","Heebo","Rubik","Noto Sans Hebrew","Arial Hebrew","Segoe UI",system-ui,-apple-system,sans-serif;
  font-size:17px;
  line-height:1.55;
  -webkit-text-size-adjust:100%;
  padding-bottom:env(safe-area-inset-bottom);
}
button,input,select,textarea{font:inherit;color:inherit}

/* ---------- shell ---------- */
.shell{max-width:560px;margin:0 auto;padding:0 16px 40px;min-height:100dvh;display:flex;flex-direction:column}

.topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 92%, transparent);
  backdrop-filter:blur(8px);padding:12px 0 10px;margin:0 -16px;padding-inline:16px;border-bottom:1px solid var(--line)}
.topbar.hidden{display:none}
.topline{display:flex;align-items:center;gap:12px;justify-content:space-between}
.mark{display:flex;align-items:center;gap:9px;min-width:0}
.mark img{height:30px;width:auto;display:block}
.mark span{font-size:15px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.counter{font-size:15px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.track{height:4px;background:var(--line);border-radius:99px;margin-top:10px;overflow:hidden}
.bar{height:100%;width:0;background:var(--brand);border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1)}

main{flex:1;display:flex;flex-direction:column;justify-content:flex-start;padding-top:26px}

/* ---------- welcome ---------- */
.welcome{text-align:center;padding:34px 0 20px;display:flex;flex-direction:column;align-items:center;gap:6px}
.welcome .logo{width:170px;max-width:62vw;height:auto;margin-bottom:22px}
:root[data-theme="dark"] .welcome .logo,
:root[data-theme="dark"] .mark img{filter:brightness(1.5) saturate(.75)}
@media (prefers-color-scheme: dark){
  .welcome .logo,.mark img{filter:brightness(1.5) saturate(.75)}
  :root[data-theme="light"] .welcome .logo,
  :root[data-theme="light"] .mark img{filter:none}
}
.hello{font-size:29px;font-weight:700;letter-spacing:-.015em;text-wrap:balance;margin:0}
.hello em{font-style:normal;color:var(--brand)}
.welcome p{color:var(--ink-2);margin:8px 0 0;font-size:17px;text-wrap:balance;max-width:34ch}
.meta-note{margin-top:26px;font-size:15px;color:var(--muted);background:var(--surface-2);
  border:1px solid var(--line);border-radius:12px;padding:12px 16px;text-align:start;width:100%}
.meta-note b{color:var(--ink-2);font-weight:600}

/* ---------- question card ---------- */
.eyebrow{font-size:14px;letter-spacing:.09em;font-weight:600;color:var(--brand);text-transform:none;margin-bottom:10px;
  display:flex;align-items:center;gap:8px}
.eyebrow::before{content:"";width:16px;height:2px;background:var(--gold);border-radius:2px;flex:none}
h1.q{font-size:25px;line-height:1.3;font-weight:700;letter-spacing:-.015em;margin:0 0 6px;text-wrap:balance}
.sub{color:var(--ink-2);font-size:16px;margin:0 0 22px}
.sub:empty{display:none}

.fields{display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:7px}
.field > label{font-size:15px;font-weight:600;color:var(--ink-2)}
.req{color:var(--brand);font-weight:700}
input[type=text],input[type=tel],input[type=email],input[type=number],input[type=date],select,textarea{
  width:100%;padding:13px 14px;background:var(--surface);border:1px solid var(--line-2);
  border-radius:11px;font-size:17px;transition:border-color .15s, box-shadow .15s;appearance:none}
input:focus-visible,select:focus-visible,textarea:focus-visible{outline:none;border-color:var(--brand);
  box-shadow:0 0 0 3px var(--brand-soft)}
input::placeholder{color:var(--muted)}
input[type=date]{min-height:49px}
.hint{font-size:14px;color:var(--muted)}
.err{font-size:14px;color:var(--danger);font-weight:600;display:none}
.field.bad input,.field.bad select{border-color:var(--danger)}
.field.bad .err{display:block}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media (max-width:400px){.row2{grid-template-columns:1fr}}
.row-addr{display:grid;grid-template-columns:2fr 1fr;gap:12px}

/* ---------- choices ---------- */
.choices{display:flex;flex-direction:column;gap:10px}
.choice{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:start;
  background:var(--surface);border:1px solid var(--line-2);border-radius:12px;
  padding:14px 15px;cursor:pointer;transition:border-color .15s,background .15s;font-size:17px;line-height:1.45}
.choice:hover{border-color:var(--line-2);background:var(--surface-2)}
.choice:focus-visible{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.choice .dot{flex:none;width:21px;height:21px;border-radius:50%;border:2px solid var(--line-2);margin-top:2px;
  position:relative;transition:border-color .15s}
.choice.sq .dot{border-radius:6px}
.choice[aria-checked="true"]{border-color:var(--brand);background:var(--brand-soft)}
.choice[aria-checked="true"] .dot{border-color:var(--brand)}
.choice[aria-checked="true"] .dot::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--brand)}
.choice.sq[aria-checked="true"] .dot::after{border-radius:2px;inset:2px;
  -webkit-mask:none}
.choice .txt{flex:1;min-width:0}
.choice .txt small{display:block;color:var(--muted);font-size:14px;margin-top:2px}

/* ---------- nav ---------- */
.nav{display:flex;gap:10px;margin-top:28px;align-items:center}
.btn{border:0;border-radius:12px;padding:15px 22px;font-size:17px;font-weight:600;cursor:pointer;
  transition:transform .12s, background .15s, opacity .15s}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
.btn-primary{background:var(--brand);color:#fff;flex:1}
:root[data-theme="dark"] .btn-primary{color:#241C24}
@media (prefers-color-scheme: dark){.btn-primary{color:#241C24}
  :root[data-theme="light"] .btn-primary{color:#fff}}
.btn-primary:hover{background:var(--brand-ink)}
.btn-ghost{background:transparent;color:var(--muted);padding:15px 12px}
.btn-ghost:hover{color:var(--ink)}
.btn-soft{background:var(--surface-2);color:var(--brand);border:1px solid var(--line-2)}
.btn-sm{padding:10px 15px;font-size:15px;border-radius:10px}

/* ---------- notices ---------- */
.notice{border-radius:12px;padding:14px 16px;font-size:16px;line-height:1.5;margin-top:4px}
.notice.info{background:var(--brand-soft);border:1px solid var(--line-2);color:var(--ink-2)}
.notice.warn{background:var(--gold-soft);border:1px solid var(--gold);color:var(--ink)}
.notice b{font-weight:700}

/* ---------- repeaters ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;
  display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow)}
.card-head{display:flex;justify-content:space-between;align-items:center;gap:10px}
.card-head h3{margin:0;font-size:16px;font-weight:700;color:var(--brand)}
.link-danger{background:none;border:0;color:var(--danger);font-size:15px;cursor:pointer;padding:4px;font-weight:600}
.add-btn{width:100%;border:1px dashed var(--line-2);background:transparent;color:var(--brand);
  border-radius:12px;padding:14px;font-size:16px;font-weight:600;cursor:pointer}
.add-btn:hover{background:var(--brand-soft)}
.add-btn[disabled]{opacity:.45;cursor:not-allowed}
.empty{color:var(--muted);font-size:15px;text-align:center;padding:8px 0}

/* ---------- part 8 list ---------- */
.legal{display:flex;flex-direction:column;gap:9px}
.legal .choice{align-items:flex-start}
.legal .choice .txt{font-size:16px;line-height:1.5}
.legal .num{flex:none;width:26px;height:26px;border-radius:7px;background:var(--surface-2);
  color:var(--muted);font-size:14px;font-weight:700;display:grid;place-items:center;margin-top:1px;
  font-variant-numeric:tabular-nums}
.legal .choice[aria-checked="true"] .num{background:var(--brand);color:#fff}
:root[data-theme="dark"] .legal .choice[aria-checked="true"] .num{color:#241C24}
.subfields{background:var(--surface-2);border:1px solid var(--line);border-radius:11px;
  padding:14px;margin:2px 0 6px;display:flex;flex-direction:column;gap:13px}
.autocount{display:flex;justify-content:space-between;gap:12px;font-size:15px;
  padding:8px 0;border-bottom:1px dashed var(--line-2)}
.autocount:last-child{border-bottom:0}
.autocount b{font-variant-numeric:tabular-nums;color:var(--brand);font-size:17px}

/* ---------- file ---------- */
.file{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.file input{display:none}
.file-name{font-size:15px;color:var(--ok);font-weight:600;word-break:break-all}

/* ---------- signature ---------- */
.sigwrap{position:relative;background:var(--surface);border:1px solid var(--line-2);border-radius:12px;overflow:hidden}
.sigwrap canvas{display:block;width:100%;height:190px;touch-action:none;cursor:crosshair}
.sigline{position:absolute;bottom:38px;right:22px;left:22px;border-bottom:1px dashed var(--line-2);pointer-events:none}
.sighint{position:absolute;bottom:14px;right:22px;font-size:14px;color:var(--muted);pointer-events:none}
.sigwrap.signed .sigline,.sigwrap.signed .sighint{display:none}
.declaration{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:16px;
  font-size:16px;line-height:1.6;color:var(--ink-2)}

/* ---------- done ---------- */
.done{text-align:center;padding:20px 0}
.seal{width:66px;height:66px;margin:0 auto 18px;border-radius:50%;background:var(--brand-soft);
  display:grid;place-items:center;border:1px solid var(--line-2)}
.seal svg{width:30px;height:30px;stroke:var(--brand);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.done h1{font-size:27px;margin:0 0 8px;font-weight:700;letter-spacing:-.015em}
.done > p{color:var(--ink-2);margin:0 auto 22px;max-width:36ch}
.summary{text-align:start;margin-top:26px}
.summary h2{font-size:15px;letter-spacing:.06em;color:var(--muted);font-weight:600;margin:22px 0 8px}
.sumrow{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line);font-size:16px}
.sumrow span{color:var(--muted);flex:none;max-width:45%}
.sumrow b{font-weight:600;text-align:end}
.mailto{color:var(--brand);font-weight:700;word-break:break-all}

/* ---------- misc ---------- */
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
.step-anim{animation:rise .34s cubic-bezier(.22,.7,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){
  .step-anim{animation:none}
  .bar{transition:none}
  .btn:active{transform:none}
}
@media (min-width:640px){
  main{padding-top:38px}
  h1.q{font-size:28px}
}
</style>

/* =========================================================
   navigation
   ========================================================= */
function visible(){ return steps.filter(function(st){ return !st.when || st.when(); }); }
function current(){ var v=visible(); if(stepIdx>=v.length) stepIdx=v.length-1; if(stepIdx<0)stepIdx=0; return v[stepIdx]; }

var screen = "welcome"; // welcome | form | done

function go(delta){
  var st = current();
  if(delta>0 && !collect(st)) return;
  stepIdx += delta;
  var v = visible();
  if(stepIdx >= v.length){ screen="done"; stepIdx=v.length-1; }
  if(stepIdx<0) stepIdx=0;
  save(); render();
  window.scrollTo({top:0,behavior:"instant"});
}

/* =========================================================
   render
   ========================================================= */
var main = document.getElementById("main");
var topbar = document.getElementById("topbar");

function render(){
  main.innerHTML = "";
  if(screen==="welcome"){ topbar.classList.add("hidden"); renderWelcome(); return; }
  if(screen==="done"){ topbar.classList.add("hidden"); renderDone(); return; }
  topbar.classList.remove("hidden");
  renderStep();
}

function renderStep(){

  next.onclick = function(){ go(1); };

/* ---------- builders ---------- */
function mkField(f){
  var wrapCls = "field";
  var d = el("div",wrapCls);
  d.dataset.key = f.k;
  var lab = el("label",null,f.l);
  lab.htmlFor = "f_"+f.k;
  d.appendChild(lab);
  var i = document.createElement("input");
  i.type = f.type==="date" ? "date" : (f.type||"text");
  i.id = "f_"+f.k;
  i.value = esc(s[f.k]);
  if(f.mode) i.inputMode = f.mode;
  if(f.max) i.maxLength = f.max;
  if(f.ph) i.placeholder = f.ph;
  if(f.mode==="numeric") i.addEventListener("input",function(){ i.value = i.value.replace(/\D/g,""); });
  i.addEventListener("input",function(){ s[f.k]=i.value; d.classList.remove("bad"); save(); });
  i.addEventListener("keydown",function(e){ if(e.key==="Enter"){ e.preventDefault(); go(1); } });
  d.appendChild(i);
  d.appendChild(el("div","err",""));
  return d;
}
function buildFields(host, fields){
  var i=0;
  while(i<fields.length){
    var f = fields[i];
    if(f.grow && fields[i+1] && fields[i+1].narrow){
      var r = el("div","row-addr");
      r.appendChild(mkField(f)); r.appendChild(mkField(fields[i+1]));
      host.appendChild(r); i+=2; continue;
    }
    if(f.half && fields[i+1] && fields[i+1].half){
      var r2 = el("div","row2");
      r2.appendChild(mkField(f)); r2.appendChild(mkField(fields[i+1]));
      host.appendChild(r2); i+=2; continue;
    }
    host.appendChild(mkField(f)); i++;
  }
}

function buildChoice(host, c){
  var box = el("div","choices");

    var b = el("button","choice");
    b.type="button"; b.setAttribute("role","radio");
    b.setAttribute("aria-checked", s[c.k]===o.v ? "true":"false");
    b.appendChild(el("span","dot"));
    var t = el("span","txt"); t.appendChild(document.createTextNode(o.l));
    if(o.note) t.appendChild(el("small",null,o.note));

      if(c.k==="gender"){ render(); return; }
      box.querySelectorAll(".choice").forEach(function(x){x.setAttribute("aria-checked","false")});

      setTimeout(function(){ go(1); }, 190);

/* ---------- signature ---------- */
function buildSign(host){
  var d = el("div","declaration");
  d.textContent = "אני "+G("מצהיר","מצהירה")+" כי הפרטים שמסרתי בטופס זה הינם מלאים ונכונים. ידוע לי שהשמטה או מסירת פרטים לא נכונים הינה עבירה על פקודת מס הכנסה. אני "+G("מתחייב","מתחייבת")+" להודיע למעסיק על כל שינוי שיחול בפרטיי האישיים ובפרטים דלעיל תוך שבוע ימים מתאריך השינוי.";
  host.appendChild(d);

  var f = el("div","field");
  f.dataset.key = "signature";
  f.appendChild(el("label",null,"חתימה"));
  var wrap = el("div","sigwrap");
  var cv = document.createElement("canvas");
  wrap.appendChild(cv);
  wrap.appendChild(el("div","sigline"));
  wrap.appendChild(el("div","sighint","חתמי כאן באצבע או בעכבר"));
  f.appendChild(wrap);
  f.appendChild(el("div","err",""));
  host.appendChild(f);

  var actions = el("div","file");
  var clear = el("button","btn btn-soft btn-sm","ניקוי החתימה"); clear.type="button";
  actions.appendChild(clear);
  var dateNote = el("span","hint","תאריך: "+fmtDate(new Date().toISOString().slice(0,10)));
  actions.appendChild(dateNote);
  host.appendChild(actions);

  var ctx, drawing=false, dirty=false, last=null;
  function setup(){
    var rect = wrap.getBoundingClientRect();
    var dpr = window.devicePixelRatio||1;
    cv.width = Math.round(rect.width*dpr);
    cv.height = Math.round(190*dpr);
    ctx = cv.getContext("2d");
    if(!ctx) return;
    ctx.scale(dpr,dpr);
    ctx.lineWidth = 2.2; ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.strokeStyle = getComputedStyle(document.body).color;
    if(s.signature){
      var img = new Image();
      img.onload = function(){ ctx.drawImage(img,0,0,rect.width,190); };
      img.src = s.signature;
      wrap.classList.add("signed"); dirty=true;
    }
  }
  function pos(e){
    var r = cv.getBoundingClientRect();
    return {x:e.clientX-r.left, y:e.clientY-r.top};
  }
  cv.addEventListener("pointerdown",function(e){
    if(!ctx) return;
    e.preventDefault(); if(cv.setPointerCapture) cv.setPointerCapture(e.pointerId);
    drawing=true; dirty=true; wrap.classList.add("signed");
    last = pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y);
  });
  cv.addEventListener("pointermove",function(e){
    if(!drawing) return; e.preventDefault();
    var p = pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p;
  });
  function end(){
    if(!drawing) return; drawing=false;
    try{ s.signature = cv.toDataURL("image/png"); s.signDate = new Date().toISOString().slice(0,10); save(); }catch(e){}
    f.classList.remove("bad");
  }
  cv.addEventListener("pointerup",end);
  cv.addEventListener("pointercancel",end);
  cv.addEventListener("pointerleave",end);
  clear.onclick = function(){
    ctx.clearRect(0,0,cv.width,cv.height); dirty=false; wrap.classList.remove("signed");
    s.signature=""; save();
  };
  setTimeout(setup,0);
}

/* =========================================================
   validation on "next"
   ========================================================= */
function fail(host,key,msg){
  var node = host ? host.querySelector('[data-key="'+key+'"]') : null;
  if(node){ node.classList.add("bad"); var e=node.querySelector(".err"); if(e) e.textContent=msg; node.scrollIntoView({block:"center",behavior:"smooth"}); }
  else { alert(msg); }
  return false;
}
function collect(st){
  var host = main;
  if(st.fields){
    for(var i=0;i<st.fields.length;i++){
      var f = st.fields[i];
      if(!f.v) continue;
      var msg = f.v(String(s[f.k]||"").trim());
      if(msg) return fail(host,f.k,msg);
    }
  }
  if(st.choice && !s[st.choice.k]) { alert("נא לבחור אחת מהאפשרויות"); return false; }
  if(st.multi && s[st.multi.k].length===0){ alert("נא לבחור לפחות אפשרות אחת"); return false; }
  if(st.kids){
    if(!s.kids.length){ alert("נא להוסיף לפחות ילד/ה אחד/ת, או לחזור אחורה ולסמן שאין ילדים"); return false; }
    for(var j=0;j<s.kids.length;j++){
      var k = s.kids[j];
      if(!k.name.trim() || !k.birth){ alert("נא להשלים שם ותאריך לידה לילד/ה "+(j+1)); return false; }
      if(k.id && !validIsraeliId(k.id)){ alert("מספר תעודת זהות לא תקין לילד/ה "+(j+1)); return false; }
    }
  }
  if(st.employers){
    if(!s.employers.length){ alert("נא להוסיף לפחות מעסיק אחד"); return false; }
    for(var m=0;m<s.employers.length;m++){
      var e2 = s.employers[m];
      if(!e2.name.trim() || !e2.address.trim() || !e2.taxFile.trim() || !e2.kind || !e2.income || !e2.tax){
        alert("נא להשלים את כל השדות של מעסיק "+(m+1)); return false;
      }
    }
  }
  if(st.upload && !s[st.upload.k]){ alert("נא לצרף את הקובץ"); return false; }
  if(st.sign && !s.signature){ return fail(host,"signature","נא לחתום לפני הסיום"); }
  return true;
}

function renderDone(){
  var w = el("section","done step-anim");
  var seal = el("div","seal");
  seal.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>';
  w.appendChild(seal);
  w.appendChild(el("h1",null,"תודה "+s.firstName+", סיימנו!"));
  w.appendChild(el("p",null, G("טופס 101 שלך מוכן. שמרנו את כל הפרטים.","טופס 101 שלך מוכן. שמרנו את כל הפרטים.")));

  if(s.taxCoord==="yes" && s.taxReason==="multi"){
    var warn = el("div","notice warn");
    warn.innerHTML = "<b>חשוב לפעול בהקדם:</b> אם לא "+G("תעביר","תעבירי")+" אישור תיאום מס לפני המשכורת הראשונה שלך בשאול תמרוקים, "+
      "ינוכו לך <b>47% מס</b>. יש לשלוח את טופס תיאום המס בהקדם לכתובת: " +
      '<a class="mailto" href="mailto:'+HR_MAIL+'">'+HR_MAIL+"</a>";
    w.appendChild(warn);
  }

  var sum = el("div","summary");
  function sec(title){ sum.appendChild(el("h2",null,title)); }
  function row(k,v){ if(v==null||v===""||v===undefined) return;
    var r=el("div","sumrow"); r.appendChild(el("span",null,k)); r.appendChild(el("b",null,String(v))); sum.appendChild(r); }

  sec("פרטים אישיים");
  row("שם מלא", s.firstName+" "+s.lastName);
  row("תעודת זהות", s.idNum);
  row("תאריך לידה", fmtDate(s.birthDate));
  row("מין", s.gender==="f"?"נקבה":"זכר");
  if(s.bornIsrael==="no") row("תאריך עלייה", fmtDate(s.aliyaDate));
  row("כתובת", [s.street,s.houseNo].filter(Boolean).join(" ")+", "+s.city+(s.zip?" "+s.zip:""));
  row("נייד", s.mobile);
  if(s.phone) row("טלפון נוסף", s.phone);
  row("אימייל", s.email);
  row("תושב ישראל", s.resident==="yes"?"כן":"לא");
  row("חבר קיבוץ / מושב שיתופי", {no:"לא",transferred:"כן, ההכנסות מועברות לקיבוץ",not_transferred:"כן, ההכנסות אינן מועברות"}[s.kibbutz]);
  row("קופת חולים", s.hmoMember==="yes" ? s.hmo : "לא חבר/ה");

  sec("מצב משפחתי");
  row("מצב משפחתי", {single:"רווק/ה",married:"נשוי/אה",divorced:"גרוש/ה",widowed:"אלמן/ה",separated:"פרוד/ה"}[s.marital]);
  if(s.marital==="married"){
    row("בן/בת זוג", s.spouseFirst+" "+s.spouseLast);
    row("ת“ז בן/בת זוג", s.spouseId);
    row("תאריך לידה", fmtDate(s.spouseBirth));
    row("הכנסת בן/בת הזוג", {none:"אין הכנסה",work:"עבודה",pension:"קצבה / עסק",other:"הכנסה אחרת"}[s.spouseIncome]);
  }
  if(s.marital==="divorced"){
    row("הורה במשפחה חד הורית", s.singleParentDiv==="yes"?"כן":"לא");
    row("מזונות", {pay:"משלם/ת",receive:"מקבל/ת",none:"אין"}[s.alimonyDiv]);
  }

  if(s.hasKids==="yes" && s.kids.length){
    sec("ילדים");
    s.kids.forEach(function(k,i){ row(k.name||("ילד/ה "+(i+1)), fmtDate(k.birth)+(k.custody==="yes"?" · בחזקתי":"")); });
  }

  sec("ההכנסה אצלנו");
  row("סוג התשלום", s.payType);
  row("תחילת עבודה", fmtDate(s.startDate));

  sec("הכנסות אחרות");
  row("הכנסות נוספות", s.otherIncome==="yes" ? s.otherKinds.join(", ") : "אין");
  if(s.otherIncome==="yes"){
    row("נקודות זיכוי", s.creditChoice==="here" ? "כנגד ההכנסה אצלנו" : "בהכנסה האחרת");
  }

  var chosen = PART8.filter(function(p){ return s.p8[p.n]; });
  sec("פטור וזיכוי ממס");
  if(!chosen.length) row("סעיפים שסומנו","לא סומנו סעיפים");
  chosen.forEach(function(p){ row("סעיף "+p.n, p.t.length>60 ? p.t.slice(0,58)+"…" : p.t); });

  sec("תיאום מס");
  if(s.taxCoord!=="yes") row("תיאום מס","אין");
  else {
    row("סיבת הבקשה", {noIncome:"לא הייתה הכנסה קודמת",multi:"הכנסות נוספות ממשכורת",approved:"אישור פקיד שומה מצורף"}[s.taxReason]);
    s.employers.forEach(function(m,i){ row("מעסיק "+(i+1), m.name+" · "+m.income+" ₪"); });
    if(s.coordFile) row("קובץ מצורף", s.coordFile);
  }

  sec("חתימה");
  row("תאריך", fmtDate(s.signDate || new Date().toISOString().slice(0,10)));
  if(s.signature){
    var r = el("div","sumrow");
    r.appendChild(el("span",null,"חתימה"));
    var im = document.createElement("img"); im.src=s.signature; im.style.height="46px"; im.alt="חתימה";
    var holder = el("b"); holder.appendChild(im);
    r.appendChild(holder); sum.appendChild(r);
  }
  w.appendChild(sum);

  var nav = el("div","nav");
  var back = el("button","btn btn-ghost","חזרה לעריכה");
  back.onclick = function(){ screen="form"; render(); };
  var dl = el("button","btn btn-primary","הורדת סיכום");
  dl.onclick = downloadSummary;
  nav.appendChild(back); nav.appendChild(dl);
  w.appendChild(nav);

  var note = el("div","meta-note");
  note.style.marginTop="20px";
  note.innerHTML = "<b>שלב הבא בפיתוח:</b> הפקת קובץ ה-PDF הרשמי של טופס 101 עם כל הפרטים האלה, ושמירה בתיקיית העובד.";
  w.appendChild(note);

  main.appendChild(w);
}

function downloadSummary(){
  var rows = [];
  document.querySelectorAll(".summary h2, .summary .sumrow").forEach(function(n){
    if(n.tagName==="H2") rows.push("\n== "+n.textContent+" ==");
    else rows.push(n.querySelector("span").textContent + ": " + n.querySelector("b").textContent);
  });
  var txt = "טופס 101 · שאול תמרוקים · שנת המס "+TAX_YEAR+"\n"+
            "מעסיק: "+EMPLOYER.name+" · תיק ניכויים "+EMPLOYER.taxFile+"\n"+
            "סניף: "+SEED.branch+"\n"+rows.join("\n");
  var blob = new Blob(["﻿"+txt],{type:"text/plain;charset=utf-8"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "טופס101_"+s.firstName+"_"+s.lastName+".txt";
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1500);
}
